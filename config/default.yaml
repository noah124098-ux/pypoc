# NSE Trading Agent — default configuration.
# Override per environment by passing --config <path> to the CLI.

mode: paper        # paper | live   (live refuses to start until backtest gate passes)
timezone: Asia/Kolkata

capital:
  initial_inr: 500000      # INR 5 lakh -- practical floor for Nifty 50 paper trading
  currency: INR

market:
  exchange: NSE
  segment: EQ
  trading_start: "09:15"
  trading_end: "15:30"
  no_new_entries_after: "14:45"   # square-off hard stop pulls in stragglers
  intraday_squareoff_at: "15:15"

universe:
  source: nifty50
  symbols: []   # empty = use full Nifty 50 list from core/data/universe.py

risk:
  per_trade_risk_pct: 1.0           # max % of equity at risk per trade
  max_position_pct: 20.0            # max % of equity in any single position
  max_open_positions: 5
  daily_loss_circuit_pct: 3.0       # halt new entries if day P&L < -3%
  drawdown_circuit_pct: 10.0        # halt + EOD review if peak-to-trough drawdown > 10%
  liquidity_max_pct_of_adv: 1.0     # order qty <= 1% of avg daily volume
  max_spread_pct: 0.3               # reject if bid-ask spread > 0.3%
  black_swan_nifty_move_pct: 2.0    # halt if Nifty moves > 2% in 15 min
  black_swan_vix_jump_pct: 20.0     # halt if VIX jumps > 20%
  stale_tick_seconds: 10            # halt new entries if no ticks for >10s during market

regime:
  adx_period: 14
  adx_trend_threshold: 20            # Relaxed from 25 — more TREND days; ADX 20 is standard trend threshold
  bb_width_range_threshold: 0.06     # Relaxed from 4% — more RANGE days; 6% still means tight consolidation
  vix_volatile_threshold: 20         # VIX > 20 => VOLATILE bias

strategies:
  # --- Original strategies (retained, parameters relaxed) ---
  trend_breakout:
    enabled: true
    regimes: [TREND]
    donchian_period: 15
    atr_period: 14
    atr_stop_multiplier: 1.5
    target_r_multiple: 2.0
    volume_confirm_ratio: 1.2        # Volume must be 20% above 20-day avg to confirm breakout
  mean_reversion:
    enabled: true
    regimes: [RANGE]
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    bb_period: 20
    bb_std: 2.0
    stock_dma_period: 50             # Block entries if stock 50-DMA falling >1% in 5 days
  volatility_compression:
    enabled: true
    regimes: [VOLATILE]
    nr_lookback: 7

  # --- New strategies ---
  ema_crossover:
    enabled: true
    regimes: [TREND]
    fast_period: 9
    slow_period: 21
    atr_period: 14
    atr_stop_multiplier: 1.5
    target_r_multiple: 2.0
    volume_confirmation: true

  rsi_momentum:
    enabled: true
    regimes: [TREND]
    rsi_period: 14
    rsi_pullback_low: 40
    rsi_pullback_high: 55
    trend_ema_period: 50
    atr_period: 14
    atr_stop_multiplier: 1.5
    target_r_multiple: 2.0
    volume_confirm_ratio: 1.1        # Volume must be 10% above avg on RSI recovery day

  bb_squeeze:
    enabled: true
    regimes: [TREND, RANGE]
    bb_period: 20
    bb_std: 2.0
    squeeze_lookback: 20
    atr_period: 14
    atr_stop_multiplier: 1.5
    target_r_multiple: 2.0
    stock_dma_period: 50             # Block entries if stock 50-DMA falling >1% in 5 days

  supertrend:
    enabled: true
    regimes: [TREND, VOLATILE]
    atr_period: 10
    multiplier: 3.0
    target_r_multiple: 2.0

  obv_trend:
    enabled: true
    regimes: [TREND]
    breakout_period: 15
    atr_period: 14
    atr_stop_multiplier: 1.5
    target_r_multiple: 2.5

execution:
  slippage_bps: 5            # 5 basis points slippage assumption for paper
  brokerage_per_order_inr: 20
  stt_pct: 0.025              # securities transaction tax on sell
  exchange_txn_pct: 0.00345
  gst_pct: 18.0               # 18% on (brokerage + exchange txn charges)
  signal_cooldown_minutes: 30 # same symbol cannot be re-entered for 30 min after exit

backtest_gate:
  min_sharpe: 1.2
  max_drawdown_pct: 15.0
  min_win_rate: 45.0
  min_profit_factor: 1.5
  min_trades: 100
  walk_forward_years: 3

data:
  primary_feed: angelone           # angelone | upstox | poll
  reconnect_max_attempts: 5
  reconnect_backoff_seconds: 2

persistence:
  sqlite_path: data/agent.db
  tick_parquet_dir: data/ticks

llm:
  eod_reviewer_model: claude-opus-4-7
  news_scorer_model: claude-haiku-4-5-20251001
  enable_eod_review: true
  auto_apply_within_safe_bounds: false   # if true, parameter changes within safe bounds auto-applied

notifications:
  telegram_enabled: false
  email_enabled: false
  dashboard_enabled: true
  dashboard_port: 8501

logging:
  level: INFO
  file: logs/agent.log
  json_log_file: logs/events.jsonl
