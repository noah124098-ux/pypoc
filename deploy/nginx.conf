worker_processes 1;

# Use the nginx installation's own temp directories so no extra folders are needed.
error_log  C:/tools/nginx-1.31.1/logs/error.log;
pid        C:/tools/nginx-1.31.1/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path  C:/tools/nginx-1.31.1/temp/client_body_temp;
    proxy_temp_path        C:/tools/nginx-1.31.1/temp/proxy_temp;
    fastcgi_temp_path      C:/tools/nginx-1.31.1/temp/fastcgi_temp;
    uwsgi_temp_path        C:/tools/nginx-1.31.1/temp/uwsgi_temp;
    scgi_temp_path         C:/tools/nginx-1.31.1/temp/scgi_temp;

    upstream dashboard {
        server 127.0.0.1:8501;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS (uncomment when TLS is configured)
        # return 301 https://$host$request_uri;

        location / {
            auth_basic "pypoc Dashboard";
            auth_basic_user_file C:/Users/Administrator/pypoc/deploy/.htpasswd;

            proxy_pass http://dashboard;
            proxy_http_version 1.1;

            # WebSocket upgrade headers — required for Streamlit
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check endpoint — no auth required
        location /healthz {
            auth_basic off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
