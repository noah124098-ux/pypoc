version: "3.9"

networks:
  pypoc-net:
    driver: bridge

services:
  agent:
    build: .
    command: python cli.py run
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD", "python", "cli.py", "health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pypoc-net

  dashboard:
    build: .
    command: >
      python -m streamlit run dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pypoc-net

  mcp-server:
    build: .
    command: python cli.py mcp-server
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Kolkata
    networks:
      - pypoc-net
